spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flashcard_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flashcard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flashcard123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
jwt.secret = this is secret mate so you need longer than 265 bit to keep secret
jwt.expiration = 3600
app.frontend-origin=${APP_FRONTEND_ORIGIN:http://localhost:5173}
app.auth.cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.client-seed-cookie-max-age=${APP_AUTH_CLIENT_SEED_COOKIE_MAX_AGE:31536000}
